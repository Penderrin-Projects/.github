name: Sync Workflows to All Repos

on:
  # Run daily to catch new repos
  schedule:
    - cron: '0 6 * * *'
  # Also allow manual trigger
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout templates
        uses: actions/checkout@v4

      - name: Sync discord-notify to all org repos
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_PAT }}
        run: |
          ORG="Penderrin-Projects"
          WORKFLOW_FILE="workflow-templates/discord-release-notify.yml"
          TARGET_PATH=".github/workflows/discord-notify.yml"
          
          # Get all repos in the org
          REPOS=$(curl -s -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/orgs/$ORG/repos?per_page=100" | jq -r '.[].name')
          
          CONTENT=$(base64 -w0 "$WORKFLOW_FILE")
          
          for REPO in $REPOS; do
            # Skip the .github repo itself
            [ "$REPO" = ".github" ] && continue
            
            # Check if workflow already exists
            EXISTING=$(curl -s -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$ORG/$REPO/contents/$TARGET_PATH" 2>&1)
            
            SHA=$(echo "$EXISTING" | jq -r '.sha // empty')
            
            if [ -z "$SHA" ]; then
              # Workflow missing — add it
              echo "Adding workflow to $REPO..."
              curl -s -X PUT \
                -H "Authorization: token $GH_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/$ORG/$REPO/contents/$TARGET_PATH" \
                -d "{\"message\":\"chore: add Discord release notification (auto-synced)\",\"content\":\"$CONTENT\"}" > /dev/null
              echo "  ✓ Added"
            else
              # Check if content matches (update if template changed)
              EXISTING_CONTENT=$(echo "$EXISTING" | jq -r '.content' | tr -d '\n')
              if [ "$EXISTING_CONTENT" != "$CONTENT" ]; then
                echo "Updating workflow in $REPO..."
                curl -s -X PUT \
                  -H "Authorization: token $GH_TOKEN" \
                  -H "Accept: application/vnd.github.v3+json" \
                  "https://api.github.com/repos/$ORG/$REPO/contents/$TARGET_PATH" \
                  -d "{\"message\":\"chore: update Discord release notification (auto-synced)\",\"content\":\"$CONTENT\",\"sha\":\"$SHA\"}" > /dev/null
                echo "  ✓ Updated"
              else
                echo "$REPO — already up to date"
              fi
            fi
          done
          
          echo "Sync complete!"
